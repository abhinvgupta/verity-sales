# Local backend stack: HTTP API + queue worker, backed by MongoDB and Redis.
#
#   docker compose up --build
#
# The api and worker run the SAME image (built once) with different commands.
# Secrets (JWT, AWS, OpenAI) come from apps/api/.env via env_file; the
# infra hostnames below override that file to point at the compose services.

x-backend-env: &backend-env
  NODE_ENV: production
  PORT: 3000
  # Mongo runs on the host (Mac), not in compose — reach it via host.docker.internal.
  MONGODB_URI: mongodb://host.docker.internal:27017/verity
  REDIS_HOST: redis
  REDIS_PORT: 6379

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: verity-backend
    restart: unless-stopped
    command: ["node", "dist/main.js"]
    env_file:
      - apps/api/.env
    environment:
      <<: *backend-env
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy

  worker:
    # Reuses the image built by the api service — no second build.
    image: verity-backend
    restart: unless-stopped
    command: ["node", "dist/main.worker.js"]
    env_file:
      - apps/api/.env
    environment:
      <<: *backend-env
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy

volumes:
  redis-data:
