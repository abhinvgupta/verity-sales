# Staging overlay — NOT auto-loaded. Run explicitly:
#
#   docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d --build
#
# What's staging-specific here:
#   - NODE_ENV=production
#   - Mongo runs as a CONTAINER here (unlike dev, which uses the host Mac),
#     with a named volume so data survives `down`/redeploys.
#
# Secrets and connection strings come from apps/api/.env on the staging host
# (per-machine, gitignored). That file must define:
#   MONGODB_URI=mongodb://<user>:<pass>@mongo:27017/verity?authSource=admin
#   MONGO_INITDB_ROOT_USERNAME=<user>
#   MONGO_INITDB_ROOT_PASSWORD=<pass>
# The host in MONGODB_URI is `mongo` — the compose service name below, resolved
# over the compose network. We do NOT set MONGODB_URI under `environment:` here:
# that would override env_file and shadow the .env.
#
# If you'd rather NOT publish the API port directly (e.g. it sits behind nginx
# or an ALB), delete the `ports:` block below and route through the proxy.

x-staging-env: &staging-env
  NODE_ENV: production

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    # Reads MONGO_INITDB_ROOT_USERNAME / _PASSWORD from the same .env as the app;
    # the other app vars in that file are simply ignored by the mongo image.
    env_file:
      - apps/api/.env
    volumes:
      - mongo-data:/data/db
    healthcheck:
      # `ping` needs no auth, so this works before/independent of credentials.
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Public entrypoint + automatic HTTPS. Caddy terminates TLS and reverse-proxies
  # to the api over the internal compose network, so api is NOT published.
  # The domain comes from SITE_ADDRESS in apps/api/.env and must have a DNS
  # A record pointing at this host for Caddy to obtain a Let's Encrypt cert.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - apps/api/.env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api

  api:
    environment:
      <<: *staging-env
    # No host port: Caddy reaches api at api:3000 over the compose network.
    depends_on:
      mongo:
        condition: service_healthy

  worker:
    environment:
      <<: *staging-env
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo-data:
  caddy-data: # ACME certs/keys — persist so Caddy doesn't re-issue on every redeploy
  caddy-config:
